esphome:
  name: honda-remote-start
  friendly_name: Honda Remote Start

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

time:
  - platform: sntp
    id: sntp_time

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret ha_api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: LIGHT

# --- HARDWARE PINS ---
switch:
  - platform: gpio
    pin: 15
    id: fob_power_switch
    name: "Key Fob Power"
    restore_mode: ALWAYS_OFF 
    internal: true

  - platform: gpio
    pin: 
      number: 12
      mode: OUTPUT_OPEN_DRAIN
    id: lock_relay
    internal: true
    inverted: true

  - platform: gpio
    pin: 
      number: 14
      mode: OUTPUT_OPEN_DRAIN
    id: unlock_relay
    internal: true
    inverted: true

  - platform: gpio
    pin: 
      number: 13
      mode: OUTPUT_OPEN_DRAIN
    id: start_relay
    internal: true
    inverted: true

# --- SCRIPTS ---
script:
  - id: remote_start_sequence
    then:
      - switch.turn_on: fob_power_switch
      - delay: 2000ms
      - switch.turn_on: lock_relay
      - delay: 700ms
      - switch.turn_off: lock_relay
      - delay: 500ms
      - switch.turn_on: start_relay
      - delay: 3500ms
      - switch.turn_off: start_relay
      - delay: 1000ms
      - switch.turn_off: fob_power_switch

  - id: lock_action
    then:
      - switch.turn_on: fob_power_switch
      - delay: 2000ms
      - switch.turn_on: lock_relay
      - delay: 700ms
      - switch.turn_off: lock_relay
      - delay: 1000ms
      - switch.turn_off: fob_power_switch

  - id: unlock_action
    then:
      - switch.turn_on: fob_power_switch
      - delay: 2000ms
      - switch.turn_on: unlock_relay
      - delay: 700ms
      - switch.turn_off: unlock_relay
      - delay: 1000ms
      - switch.turn_off: fob_power_switch

# --- BUTTONS ---
button:
  - platform: template
    name: "Start Engine"
    icon: "mdi:engine"
    on_press:
      - script.execute: remote_start_sequence

  - platform: template
    name: "Lock Doors"
    icon: "mdi:lock"
    on_press:
      - script.execute: lock_action

  - platform: template
    name: "Unlock Doors"
    icon: "mdi:lock-open"
    on_press:
      - script.execute: unlock_action
